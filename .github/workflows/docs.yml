name: Docs

on:
  push:
    branches: [main]
    paths: ['crates/**/*.rs', 'docs/ARCHITECTURE.md']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  docs:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: docs-cargo-${{ hashFiles('**/Cargo.lock') }}

      # --- API docs (cargo doc) ---
      - run: cargo doc --workspace --no-deps --exclude bloom-gui
        env:
          RUSTDOCFLAGS: "--cfg docsrs"

      # --- Animated docs pipeline ---
      - name: Generate animation frames
        run: cargo test -p bloom-test-harness --test animations

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install script dependencies
        run: cd scripts && npm ci

      - name: Render SVG frames
        run: node scripts/render-animations.js

      - name: Assemble GIFs
        run: node scripts/assemble-gifs.js

      - name: Copy GIFs to docs site
        run: |
          mkdir -p docs-site/static/animations
          cp target/animations/*.gif docs-site/static/animations/ 2>/dev/null || true

      # --- Build site (future: Docusaurus) ---
      - name: Add redirect to bloom_core
        run: echo '<meta http-equiv="refresh" content="0; url=bloom_core/">' > target/doc/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc
      - id: deployment
        uses: actions/deploy-pages@v4
