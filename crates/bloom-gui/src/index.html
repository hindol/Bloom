<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom 🌱</title>
  <style>
    /* ── Reset ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      /* Lambda theme defaults (bloom-dark) — overridden by JS from backend */
      --fg: #ebe9e7; --bg: #141414; --modeline: #1a1919; --highlight: #212228;
      --critical: #cf6752; --popout: #7a9eff; --strong: #f5f2f0;
      --salient: #f4bf4f; --faded: #a3a3a3; --subtle: #37373e;
      --mild: #474648; --ultralight: #2c2c34;
      --accent-red: #ec6a5e; --accent-green: #62c554;
      --accent-blue: #81a1c1; --accent-yellow: #f2da61;
      --status-normal: #f4bf4f; --status-insert: #62c554;
      --status-visual: #7a9eff; --status-command: #81a1c1;

      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', 'Menlo', monospace;
      --line-height: 21px;
      --char-width: 8.4px;
      --font-size: 14px;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-mono);
      font-size: var(--font-size);
      line-height: var(--line-height);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Pane container ── */
    #panes-container {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .pane + .pane { border-left: 1px solid var(--faded); }

    .pane-editor {
      flex: 1;
      padding: 4px 0;
      overflow: hidden;
      white-space: pre;
      position: relative;
      background: var(--bg);
    }

    /* ── Lines ── */
    .line {
      height: var(--line-height);
      padding: 0 8px;
      white-space: pre;
    }

    .line.current-line { background: var(--highlight); }

    .line.tilde { color: var(--faded); }

    /* ── Cursor ── */
    .cursor {
      position: absolute;
      background: var(--fg);
      width: var(--char-width);
      height: var(--line-height);
      opacity: 0.7;
      transition: top 0.04s ease-out, left 0.04s ease-out;
      pointer-events: none;
      z-index: 10;
    }
    .cursor.bar { width: 2px; opacity: 1; }
    .cursor.underline { height: 2px; opacity: 1; }

    /* ── Styled spans ── */
    .s-h1 { color: var(--strong); font-weight: bold; }
    .s-h2 { color: var(--salient); font-weight: bold; }
    .s-h3 { color: var(--fg); font-weight: bold; }
    .s-h4, .s-h5, .s-h6 { font-weight: bold; }
    .s-bold { font-weight: bold; }
    .s-italic { font-style: italic; }
    .s-code { background: var(--subtle); }
    .s-code-block { background: var(--subtle); }
    .s-link { color: var(--strong); background: var(--modeline); text-decoration: underline; }
    .s-embed { color: var(--strong); background: var(--modeline); font-style: italic; }
    .s-tag { color: var(--faded); }
    .s-timestamp { color: var(--faded); }
    .s-block-id { color: var(--faded); opacity: 0.7; }
    .s-list-marker { color: var(--faded); }
    .s-checkbox-unchecked { color: var(--accent-yellow); }
    .s-checkbox-checked { color: var(--accent-green); text-decoration: line-through; }
    .s-frontmatter { color: var(--faded); font-style: italic; }
    .s-broken-link { color: var(--critical); text-decoration: line-through; }

    /* ── Status bar ── */
    .status-bar {
      height: 24px;
      line-height: 24px;
      padding: 0 8px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      font-weight: bold;
      flex-shrink: 0;
    }

    .status-bar.NORMAL { background: var(--status-normal); color: var(--bg); }
    .status-bar.INSERT { background: var(--status-insert); color: var(--bg); }
    .status-bar.VISUAL { background: var(--status-visual); color: #fff; }
    .status-bar.COMMAND { background: var(--status-command); color: var(--bg); }

    /* ── Command line ── */
    #command-line {
      height: var(--line-height);
      line-height: var(--line-height);
      padding: 0 8px;
      background: var(--bg);
      color: var(--fg);
      flex-shrink: 0;
    }

    /* ── Capture bar ── */
    #capture-bar {
      height: var(--line-height);
      line-height: var(--line-height);
      padding: 0 8px;
      background: var(--subtle);
      color: var(--fg);
      flex-shrink: 0;
      display: none;
    }
    #capture-bar .capture-icon { color: var(--salient); margin-right: 6px; }

    /* ── Overlay backdrop ── */
    .overlay-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay-backdrop.active { display: flex; }

    /* ── Picker ── */
    .picker {
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 6px;
      width: 75%;
      max-width: 720px;
      max-height: 70vh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .picker.inline-picker {
      position: fixed;
      width: 40%;
      max-width: 400px;
      max-height: 200px;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 4px;
    }

    .picker-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .picker-right {
      flex: 1;
      border-left: 1px solid var(--faded);
      overflow-y: auto;
      padding: 8px;
      display: none;
    }
    .picker-right.has-preview { display: block; }

    .picker-title {
      padding: 6px 10px;
      font-weight: bold;
      color: var(--salient);
      font-size: 13px;
      border-bottom: 1px solid var(--faded);
    }

    .picker-query {
      padding: 6px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .picker-query .prompt { color: var(--salient); }
    .picker-query .query-text { color: var(--fg); }
    .picker-query .filter-pill {
      background: var(--mild);
      color: var(--accent-yellow);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    .picker-results {
      flex: 1;
      overflow-y: auto;
      padding: 2px 0;
    }

    .picker-item {
      padding: 2px 10px;
      display: flex;
      justify-content: space-between;
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
    }
    .picker-item.selected { background: var(--mild); }
    .picker-item.marked .item-prefix::before { content: '✓'; color: var(--accent-green); margin-right: 4px; }
    .picker-item .item-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .picker-item .item-text .match-char { color: var(--salient); font-weight: bold; }
    .picker-item .item-marginalia {
      color: var(--faded);
      margin-left: 12px;
      flex-shrink: 0;
      font-size: 12px;
    }

    .picker-count {
      padding: 4px 10px;
      color: var(--faded);
      font-size: 12px;
      text-align: right;
      border-top: 1px solid var(--faded);
    }

    /* ── Action menu ── */
    .action-menu {
      position: absolute;
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 4px;
      padding: 4px 0;
      z-index: 200;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .action-menu-item {
      padding: 3px 12px;
      cursor: default;
      white-space: nowrap;
    }
    .action-menu-item.selected { background: var(--mild); color: var(--fg); }

    /* ── Which-key ── */
    .which-key {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--subtle);
      border-top: 1px solid var(--faded);
      z-index: 90;
      display: none;
      padding: 6px 12px;
    }
    .which-key.active { display: block; }

    .which-key-title {
      color: var(--salient);
      font-weight: bold;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .which-key-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2px 24px;
    }

    .which-key-entry {
      display: flex;
      gap: 6px;
      font-size: 13px;
      min-width: 160px;
    }
    .which-key-entry .wk-key {
      font-weight: bold;
      min-width: 20px;
    }
    .which-key-entry .wk-key.group { color: var(--popout); }
    .which-key-entry .wk-key.cmd { color: var(--salient); }
    .which-key-entry .wk-desc { color: var(--fg); }
    .which-key-entry .wk-desc.group { color: var(--popout); }
    .which-key-entry .wk-arrow { color: var(--popout); }

    /* ── Undo tree overlay ── */
    .undo-tree-overlay {
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 6px;
      padding: 0;
      width: 300px;
      max-height: 60vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .undo-tree-overlay .overlay-title {
      padding: 6px 10px;
      font-weight: bold;
      color: var(--salient);
      border-bottom: 1px solid var(--faded);
    }
    .undo-tree-items { overflow-y: auto; padding: 4px 0; }
    .undo-tree-item {
      padding: 2px 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .undo-tree-item.selected { background: var(--mild); color: var(--accent-yellow); font-weight: bold; }
    .undo-tree-item .ut-marker { width: 12px; text-align: center; }
    .undo-tree-item .ut-marker.current { color: var(--accent-green); }

    /* ── Agenda overlay ── */
    .agenda-overlay {
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 6px;
      width: 500px;
      max-height: 70vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .agenda-overlay .overlay-title {
      padding: 6px 10px;
      font-weight: bold;
      color: var(--salient);
      border-bottom: 1px solid var(--faded);
    }
    .agenda-sections { overflow-y: auto; padding: 4px 0; }
    .agenda-section-label {
      padding: 4px 10px;
      color: var(--salient);
      font-weight: bold;
      font-size: 13px;
    }
    .agenda-item {
      padding: 2px 10px;
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .agenda-item.selected { background: var(--mild); color: var(--accent-yellow); font-weight: bold; }
    .agenda-item.completed { color: var(--faded); text-decoration: line-through; }
    .agenda-item .ai-check { width: 30px; flex-shrink: 0; }
    .agenda-item .ai-date { color: var(--faded); width: 80px; flex-shrink: 0; font-size: 12px; }
    .agenda-item .ai-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .agenda-item .ai-page { color: var(--faded); font-size: 12px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="panes-container"></div>
  <div id="capture-bar"><span class="capture-icon">▸</span><span id="capture-text"></span></div>
  <div id="command-line"></div>

  <!-- Picker overlay -->
  <div id="picker-backdrop" class="overlay-backdrop">
    <div id="picker" class="picker">
      <div class="picker-left">
        <div class="picker-title" id="picker-title"></div>
        <div class="picker-query" id="picker-query"></div>
        <div class="picker-results" id="picker-results"></div>
        <div class="picker-count" id="picker-count"></div>
      </div>
      <div class="picker-right" id="picker-preview"></div>
    </div>
  </div>

  <!-- Undo tree overlay -->
  <div id="undo-backdrop" class="overlay-backdrop">
    <div class="undo-tree-overlay">
      <div class="overlay-title" id="undo-title"></div>
      <div class="undo-tree-items" id="undo-items"></div>
    </div>
  </div>

  <!-- Agenda overlay -->
  <div id="agenda-backdrop" class="overlay-backdrop">
    <div class="agenda-overlay">
      <div class="overlay-title" id="agenda-title"></div>
      <div class="agenda-sections" id="agenda-sections"></div>
    </div>
  </div>

  <!-- Which-key popup -->
  <div id="which-key" class="which-key">
    <div class="which-key-title" id="wk-title"></div>
    <div class="which-key-grid" id="wk-grid"></div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;

    const panesContainer = document.getElementById('panes-container');
    const commandLine = document.getElementById('command-line');
    const captureBar = document.getElementById('capture-bar');
    const captureText = document.getElementById('capture-text');

    // Picker elements
    const pickerBackdrop = document.getElementById('picker-backdrop');
    const pickerEl = document.getElementById('picker');
    const pickerTitle = document.getElementById('picker-title');
    const pickerQuery = document.getElementById('picker-query');
    const pickerResults = document.getElementById('picker-results');
    const pickerCount = document.getElementById('picker-count');
    const pickerPreview = document.getElementById('picker-preview');

    // Which-key elements
    const whichKeyEl = document.getElementById('which-key');
    const wkTitle = document.getElementById('wk-title');
    const wkGrid = document.getElementById('wk-grid');

    // Undo tree elements
    const undoBackdrop = document.getElementById('undo-backdrop');
    const undoTitle = document.getElementById('undo-title');
    const undoItems = document.getElementById('undo-items');

    // Agenda elements
    const agendaBackdrop = document.getElementById('agenda-backdrop');
    const agendaTitle = document.getElementById('agenda-title');
    const agendaSections = document.getElementById('agenda-sections');

    // ── Theme application ──
    function applyTheme(theme) {
      const r = document.documentElement.style;
      r.setProperty('--fg', theme.foreground);
      r.setProperty('--bg', theme.background);
      r.setProperty('--modeline', theme.modeline);
      r.setProperty('--highlight', theme.highlight);
      r.setProperty('--critical', theme.critical);
      r.setProperty('--popout', theme.popout);
      r.setProperty('--strong', theme.strong);
      r.setProperty('--salient', theme.salient);
      r.setProperty('--faded', theme.faded);
      r.setProperty('--subtle', theme.subtle);
      r.setProperty('--mild', theme.mild);
      r.setProperty('--ultralight', theme.ultralight);
      r.setProperty('--accent-red', theme.accent_red);
      r.setProperty('--accent-green', theme.accent_green);
      r.setProperty('--accent-blue', theme.accent_blue);
      r.setProperty('--accent-yellow', theme.accent_yellow);
      r.setProperty('--status-normal', theme.status_normal);
      r.setProperty('--status-insert', theme.status_insert);
      r.setProperty('--status-visual', theme.status_visual);
      r.setProperty('--status-command', theme.status_command);
    }

    // ── Style class mapping ──
    const STYLE_CLASS = {
      'normal': '', 'h1': 's-h1', 'h2': 's-h2', 'h3': 's-h3',
      'h4': 's-h4', 'h5': 's-h5', 'h6': 's-h6',
      'bold': 's-bold', 'italic': 's-italic',
      'code': 's-code', 'code-block': 's-code-block',
      'link': 's-link', 'embed': 's-embed',
      'tag': 's-tag', 'timestamp': 's-timestamp',
      'block-id': 's-block-id', 'list-marker': 's-list-marker',
      'checkbox-unchecked': 's-checkbox-unchecked',
      'checkbox-checked': 's-checkbox-checked',
      'frontmatter': 's-frontmatter', 'broken-link': 's-broken-link',
    };

    // ── Render a styled line ──
    function renderStyledLine(lineData) {
      const text = lineData.text;
      const spans = lineData.spans || [];

      if (lineData.line_number === null) {
        return escapeHtml('~');
      }

      if (spans.length === 0 || text.length === 0) {
        return escapeHtml(text) || ' ';
      }

      // Sort spans by start position
      const sorted = [...spans].sort((a, b) => a.start - b.start || b.end - a.end);
      let result = '';
      let pos = 0;

      for (const span of sorted) {
        const start = Math.min(span.start, text.length);
        const end = Math.min(span.end, text.length);
        if (start >= end || start < pos) continue;

        if (pos < start) {
          result += escapeHtml(text.slice(pos, start));
        }

        const cls = STYLE_CLASS[span.style] || '';
        if (cls) {
          result += `<span class="${cls}">${escapeHtml(text.slice(start, end))}</span>`;
        } else {
          result += escapeHtml(text.slice(start, end));
        }
        pos = end;
      }

      if (pos < text.length) {
        result += escapeHtml(text.slice(pos));
      }

      return result || ' ';
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Main render ──
    function renderFrame(frame) {
      applyTheme(frame.theme);

      // ── Panes ──
      panesContainer.innerHTML = '';
      for (const pane of frame.panes) {
        const paneEl = document.createElement('div');
        paneEl.className = 'pane';

        // Editor area
        const editorEl = document.createElement('div');
        editorEl.className = 'pane-editor';

        for (let i = 0; i < pane.lines.length; i++) {
          const lineData = pane.lines[i];
          const div = document.createElement('div');

          let classes = 'line';
          if (lineData.line_number === null) classes += ' tilde';
          if (pane.focused && i === pane.cursor_row) classes += ' current-line';
          div.className = classes;
          div.innerHTML = renderStyledLine(lineData);
          editorEl.appendChild(div);
        }

        // Cursor
        if (pane.focused) {
          const cursorEl = document.createElement('div');
          let cursorClass = 'cursor';
          if (pane.cursor_shape === 'Bar') cursorClass += ' bar';
          else if (pane.cursor_shape === 'Underline') cursorClass += ' underline';
          cursorEl.className = cursorClass;

          const charWidth = 8.4;
          const lineHeight = 21;
          cursorEl.style.top = (pane.cursor_row * lineHeight + 4) + 'px';
          cursorEl.style.left = (pane.cursor_col * charWidth + 8) + 'px';
          editorEl.appendChild(cursorEl);
        }

        paneEl.appendChild(editorEl);

        // Status bar
        const statusEl = document.createElement('div');
        statusEl.className = 'status-bar ' + pane.status_bar.mode;
        const dirty = pane.status_bar.dirty ? ' [+]' : '';
        const pending = pane.status_bar.pending_keys ? ` ${pane.status_bar.pending_keys}` : '';
        statusEl.innerHTML = `<span> ${escapeHtml(pane.status_bar.mode)} │ ${escapeHtml(pane.status_bar.filename)}${dirty}${pending}</span><span>${escapeHtml(pane.status_bar.position)} │ ${escapeHtml(pane.status_bar.filetype)} </span>`;
        paneEl.appendChild(statusEl);

        panesContainer.appendChild(paneEl);
      }

      // ── Capture bar ──
      if (frame.capture_bar) {
        captureBar.style.display = 'block';
        captureText.textContent = frame.capture_bar;
      } else {
        captureBar.style.display = 'none';
      }

      // ── Command line ──
      commandLine.textContent = frame.command_line || '';

      // ── Picker ──
      if (frame.picker) {
        renderPicker(frame.picker);
        pickerBackdrop.classList.add('active');
        if (frame.picker.inline) {
          pickerEl.classList.add('inline-picker');
          pickerBackdrop.style.background = 'transparent';
        } else {
          pickerEl.classList.remove('inline-picker');
          pickerBackdrop.style.background = '';
        }
      } else {
        pickerBackdrop.classList.remove('active');
      }

      // ── Which-key ──
      if (frame.which_key && frame.which_key.entries.length > 0) {
        renderWhichKey(frame.which_key);
        whichKeyEl.classList.add('active');
      } else {
        whichKeyEl.classList.remove('active');
      }

      // ── Undo tree ──
      if (frame.undo_tree) {
        renderUndoTree(frame.undo_tree);
        undoBackdrop.classList.add('active');
      } else {
        undoBackdrop.classList.remove('active');
      }

      // ── Agenda ──
      if (frame.agenda) {
        renderAgenda(frame.agenda);
        agendaBackdrop.classList.add('active');
      } else {
        agendaBackdrop.classList.remove('active');
      }
    }

    // ── Picker rendering ──
    function renderPicker(picker) {
      pickerTitle.textContent = picker.title;

      // Query + filter pills
      let queryHtml = `<span class="prompt">❯</span> <span class="query-text">${escapeHtml(picker.query)}</span>`;
      for (const pill of picker.filters) {
        queryHtml += ` <span class="filter-pill">[${escapeHtml(pill.kind)}:${escapeHtml(pill.label)}]</span>`;
      }
      pickerQuery.innerHTML = queryHtml;

      // Results
      pickerResults.innerHTML = '';
      for (const item of picker.items) {
        const div = document.createElement('div');
        let cls = 'picker-item';
        if (item.selected) cls += ' selected';
        if (item.marked) cls += ' marked';
        div.className = cls;

        // Build text with match highlighting
        let textHtml = '<span class="item-prefix">';
        if (item.marked && item.selected) textHtml += '✓▸ ';
        else if (item.marked) textHtml += '✓ ';
        else if (item.selected) textHtml += '▸ ';
        else textHtml += '  ';
        textHtml += '</span><span class="item-text">';

        const chars = [...item.text];
        for (let i = 0; i < chars.length; i++) {
          if (item.match_indices.includes(i)) {
            textHtml += `<span class="match-char">${escapeHtml(chars[i])}</span>`;
          } else {
            textHtml += escapeHtml(chars[i]);
          }
        }
        textHtml += '</span>';

        if (item.marginalia) {
          textHtml += `<span class="item-marginalia">${escapeHtml(item.marginalia)}</span>`;
        }

        div.innerHTML = textHtml;
        pickerResults.appendChild(div);
      }

      // Count
      pickerCount.textContent = picker.result_count;

      // Preview
      if (picker.preview && picker.preview.length > 0 && !picker.inline) {
        pickerPreview.classList.add('has-preview');
        pickerPreview.innerHTML = '';
        for (const line of picker.preview) {
          const div = document.createElement('div');
          div.className = 'line';
          div.innerHTML = renderStyledLine(line);
          pickerPreview.appendChild(div);
        }
      } else {
        pickerPreview.classList.remove('has-preview');
        pickerPreview.innerHTML = '';
      }

      // Action menu
      const existingMenu = document.querySelector('.action-menu');
      if (existingMenu) existingMenu.remove();

      if (picker.action_menu && picker.action_menu_selected !== null) {
        const menu = document.createElement('div');
        menu.className = 'action-menu';
        for (let i = 0; i < picker.action_menu.length; i++) {
          const menuItem = document.createElement('div');
          menuItem.className = 'action-menu-item' + (i === picker.action_menu_selected ? ' selected' : '');
          menuItem.textContent = picker.action_menu[i];
          menu.appendChild(menuItem);
        }
        pickerEl.appendChild(menu);
        menu.style.top = '40px';
        menu.style.right = '10px';
      }
    }

    // ── Which-key rendering ──
    function renderWhichKey(wk) {
      wkTitle.textContent = wk.prefix ? `${wk.prefix} …` : 'Which Key';
      wkGrid.innerHTML = '';
      for (const entry of wk.entries) {
        const div = document.createElement('div');
        div.className = 'which-key-entry';
        const keyClass = entry.is_group ? 'group' : 'cmd';
        const descClass = entry.is_group ? 'group' : '';
        const arrow = entry.is_group ? '<span class="wk-arrow"> ▸</span>' : '';
        div.innerHTML = `<span class="wk-key ${keyClass}">${escapeHtml(entry.key)}</span><span class="wk-desc ${descClass}">${escapeHtml(entry.description)}${arrow}</span>`;
        wkGrid.appendChild(div);
      }
    }

    // ── Undo tree rendering ──
    function renderUndoTree(ut) {
      undoTitle.textContent = ut.title;
      undoItems.innerHTML = '';
      for (let i = 0; i < ut.entries.length; i++) {
        const entry = ut.entries[i];
        const div = document.createElement('div');
        div.className = 'undo-tree-item' + (i === ut.selected ? ' selected' : '');
        const markerClass = entry.current ? 'current' : '';
        const marker = entry.current ? '●' : ' ';
        div.innerHTML = `<span class="ut-marker ${markerClass}">${marker}</span> branch ${entry.branch_index}`;
        undoItems.appendChild(div);
      }
    }

    // ── Agenda rendering ──
    function renderAgenda(agenda) {
      agendaTitle.textContent = agenda.title;
      agendaSections.innerHTML = '';
      let flatIdx = 0;
      for (const section of agenda.sections) {
        const label = document.createElement('div');
        label.className = 'agenda-section-label';
        label.textContent = `── ${section.label} ──`;
        agendaSections.appendChild(label);

        for (const item of section.items) {
          const div = document.createElement('div');
          let cls = 'agenda-item';
          if (flatIdx === agenda.selected) cls += ' selected';
          if (item.completed) cls += ' completed';
          div.className = cls;

          const check = item.completed ? '[x]' : '[ ]';
          div.innerHTML = `<span class="ai-check">${check}</span><span class="ai-date">${escapeHtml(item.date)}</span><span class="ai-text">${escapeHtml(item.text)}</span><span class="ai-page">${escapeHtml(item.page_title)}</span>`;
          agendaSections.appendChild(div);
          flatIdx++;
        }
      }
    }

    // ── Viewport sizing ──
    function updateViewport() {
      const lineHeight = 21;
      const statusBarHeight = 24;
      const cmdLineHeight = 21;
      const totalHeight = window.innerHeight;
      const editorHeight = totalHeight - statusBarHeight - cmdLineHeight;
      const rows = Math.floor(editorHeight / lineHeight);
      if (rows > 0) {
        invoke('resize_viewport', { height: rows });
      }
    }

    // ── Key handling ──
    document.addEventListener('keydown', async (e) => {
      e.preventDefault();

      let key = null;

      if (e.altKey && e.key === 'Enter') {
        key = 'AltEnter';
      } else if (e.ctrlKey && e.key.length === 1) {
        key = 'Ctrl+' + e.key;
      } else if (e.key === 'Escape') {
        key = 'Escape';
      } else if (e.key === 'Enter') {
        key = 'Enter';
      } else if (e.key === 'Backspace') {
        key = 'Backspace';
      } else if (e.key === 'Tab') {
        key = 'Tab';
      } else if (e.key === 'ArrowLeft') {
        key = 'ArrowLeft';
      } else if (e.key === 'ArrowRight') {
        key = 'ArrowRight';
      } else if (e.key === 'ArrowUp') {
        key = 'ArrowUp';
      } else if (e.key === 'ArrowDown') {
        key = 'ArrowDown';
      } else if (e.key.length === 1) {
        key = e.key;
      }

      if (key) {
        const [result, frame] = await invoke('send_key', { key });
        renderFrame(frame);

        if (result === 'quit' || result === 'save_and_quit') {
          const { getCurrentWindow } = window.__TAURI__.window;
          await getCurrentWindow().close();
        }
      }
    });

    // ── Initialization ──
    window.addEventListener('resize', () => {
      updateViewport();
      invoke('get_frame').then(renderFrame);
    });

    updateViewport();
    invoke('get_frame').then(renderFrame);
  </script>
</body>
</html>
