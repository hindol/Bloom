<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom 🌱</title>
  <style>
    :root {
      --bg: #141414;
      --fg: #EBE9E7;
      --faded: #A3A3A3;
      --salient: #F4BF4F;
      --strong: #F5F2F0;
      --subtle: #37373E;
      --modeline: #1A1919;
      --highlight: #212228;
      --accent-green: #62C554;
      --accent-red: #CF6752;
      --accent-blue: #81A1C1;
      --accent-yellow: #F2DA61;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #editor {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .pane {
      position: absolute;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pane-content {
      flex: 1;
      overflow: hidden;
    }

    .line {
      white-space: pre;
      height: 1.6em;
    }

    .gutter {
      display: inline-block;
      width: 4em;
      text-align: right;
      padding-right: 0.5em;
      color: var(--faded);
      user-select: none;
    }

    .status-bar {
      height: 1.6em;
      padding: 0 1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .status-bar.active {
      background: var(--highlight);
    }

    .status-bar.inactive {
      background: var(--subtle);
      color: var(--faded);
    }

    .mode-badge {
      font-weight: bold;
      margin-right: 0.5em;
    }

    .mode-normal { color: var(--fg); }
    .mode-insert { color: var(--bg); background: var(--accent-green); padding: 0 4px; }
    .mode-visual { color: var(--bg); background: var(--accent-blue); padding: 0 4px; }

    /* Syntax styles */
    .s-heading-1 { color: var(--strong); font-weight: bold; font-size: 1.5em; }
    .s-heading-2 { color: var(--salient); font-weight: bold; font-size: 1.3em; }
    .s-bold { font-weight: bold; }
    .s-italic { font-style: italic; }
    .s-tag { color: var(--faded); }
    .s-noise { color: var(--faded); opacity: 0.5; }
    .s-link { color: var(--strong); text-decoration: underline; }
    .s-checkbox-unchecked { color: var(--accent-yellow); }
    .s-checkbox-checked { color: var(--accent-green); text-decoration: line-through; }
    .s-frontmatter { color: var(--faded); font-style: italic; }

    .current-line { background: var(--highlight); }

    /* Picker overlay */
    .picker-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10vh;
      z-index: 100;
    }

    .picker {
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 8px;
      width: 60%;
      max-width: 700px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .picker-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .picker-title {
      color: var(--faded);
      font-size: 11px;
      margin-bottom: 8px;
    }

    .picker-input {
      background: var(--bg);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--fg);
      display: flex;
    }

    .picker-input .prompt { color: var(--faded); margin-right: 4px; }
    .picker-input .query { color: var(--fg); }
    .picker-input .cursor { border-left: 2px solid var(--salient); }

    .picker-results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .picker-row {
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
      cursor: default;
    }

    .picker-row.selected {
      background: rgba(255,255,255,0.08);
    }

    .picker-row .label { color: var(--fg); }
    .picker-row .marker { color: var(--salient); width: 1.5em; }
    .picker-row .middle { color: var(--faded); margin-left: 1em; }
    .picker-row .right { color: var(--faded); margin-left: auto; padding-left: 1em; }

    .picker-status {
      padding: 4px 16px 8px;
      color: var(--faded);
      font-size: 11px;
    }

    .picker-preview {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px;
      background: var(--bg);
      color: var(--faded);
      max-height: 30%;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 12px;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--faded);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="loading">Bloom 🌱</div>
  <div id="editor" style="display: none;"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    const editorEl = document.getElementById('editor');
    const loadingEl = document.getElementById('loading');

    // Style class mapping from Bloom's Style enum
    const STYLE_MAP = {
      'Normal': '',
      'Heading': 's-heading-1',
      'Bold': 's-bold',
      'Italic': 's-italic',
      'Tag': 's-tag',
      'SyntaxNoise': 's-noise',
      'LinkText': 's-link',
      'LinkChrome': 's-noise',
      'CheckboxUnchecked': 's-checkbox-unchecked',
      'CheckboxChecked': 's-checkbox-checked',
      'Frontmatter': 's-frontmatter',
      'FrontmatterTitle': 's-bold s-italic',
    };

    function renderFrame(frame) {
      loadingEl.style.display = 'none';
      editorEl.style.display = 'block';
      editorEl.innerHTML = '';

      for (const pane of frame.panes) {
        const paneEl = document.createElement('div');
        paneEl.className = 'pane';

        const contentEl = document.createElement('div');
        contentEl.className = 'pane-content';

        for (let i = 0; i < pane.visible_lines.length; i++) {
          const line = pane.visible_lines[i];
          const lineEl = document.createElement('div');
          lineEl.className = 'line';

          // Check if this is the cursor line
          const bufferLine = line.source.Buffer;
          if (pane.is_active && bufferLine !== undefined && bufferLine === pane.cursor.line) {
            lineEl.classList.add('current-line');
          }

          // Gutter
          const gutterEl = document.createElement('span');
          gutterEl.className = 'gutter';
          gutterEl.textContent = bufferLine !== undefined ? String(bufferLine + 1) : '';
          lineEl.appendChild(gutterEl);

          // Content with styled spans
          const text = line.text.replace(/[\r\n]+$/, '');
          if (line.spans.length === 0) {
            lineEl.appendChild(document.createTextNode(text));
          } else {
            let lastEnd = 0;
            for (const span of line.spans) {
              const start = Math.min(span.range.start, text.length);
              const end = Math.min(span.range.end, text.length);
              if (lastEnd < start) {
                lineEl.appendChild(document.createTextNode(text.slice(lastEnd, start)));
              }
              const spanEl = document.createElement('span');
              const styleClass = resolveStyleClass(span.style);
              if (styleClass) spanEl.className = styleClass;
              spanEl.textContent = text.slice(start, end);
              lineEl.appendChild(spanEl);
              lastEnd = end;
            }
            if (lastEnd < text.length) {
              lineEl.appendChild(document.createTextNode(text.slice(lastEnd)));
            }
          }

          contentEl.appendChild(lineEl);
        }

        paneEl.appendChild(contentEl);

        // Status bar
        const statusEl = document.createElement('div');
        statusEl.className = `status-bar ${pane.is_active ? 'active' : 'inactive'}`;
        if (pane.is_active) {
          statusEl.innerHTML = `
            <div>
              <span class="mode-badge mode-${pane.status_bar.mode.toLowerCase()}">${pane.status_bar.mode}</span>
              ${pane.title}${pane.dirty ? ' <span style="color:var(--salient)">[+]</span>' : ''}
            </div>
            <div style="color:var(--faded)">${pane.cursor.line + 1}:${pane.cursor.column + 1}</div>
          `;
        } else {
          statusEl.textContent = pane.title;
        }
        paneEl.appendChild(statusEl);

        editorEl.appendChild(paneEl);
      }

      // Picker overlay
      if (frame.picker) {
        const p = frame.picker;
        const overlayEl = document.createElement('div');
        overlayEl.className = 'picker-overlay';

        const pickerEl = document.createElement('div');
        pickerEl.className = 'picker';

        // Header with title and query input
        const headerEl = document.createElement('div');
        headerEl.className = 'picker-header';
        headerEl.innerHTML = `
          <div class="picker-title">${p.title}</div>
          <div class="picker-input">
            <span class="prompt">❯ </span>
            <span class="query">${escapeHtml(p.query)}</span>
            <span class="cursor">&nbsp;</span>
          </div>
        `;
        pickerEl.appendChild(headerEl);

        // Results
        const resultsEl = document.createElement('div');
        resultsEl.className = 'picker-results';
        for (let i = 0; i < p.results.length; i++) {
          const row = p.results[i];
          const rowEl = document.createElement('div');
          rowEl.className = `picker-row${i === p.selected_index ? ' selected' : ''}`;
          
          let html = `<span class="marker">${i === p.selected_index ? '▸' : ' '}</span>`;
          html += `<span class="label">${escapeHtml(row.label)}</span>`;
          if (row.middle) html += `<span class="middle">${escapeHtml(row.middle)}</span>`;
          if (row.right) html += `<span class="right">${escapeHtml(row.right)}</span>`;
          rowEl.innerHTML = html;
          resultsEl.appendChild(rowEl);
        }
        pickerEl.appendChild(resultsEl);

        // Status line
        const statusEl = document.createElement('div');
        statusEl.className = 'picker-status';
        statusEl.textContent = `${p.filtered_count} of ${p.total_count} ${p.status_noun}`;
        pickerEl.appendChild(statusEl);

        // Preview
        if (p.preview) {
          const previewEl = document.createElement('div');
          previewEl.className = 'picker-preview';
          previewEl.textContent = p.preview;
          pickerEl.appendChild(previewEl);
        }

        overlayEl.appendChild(pickerEl);
        editorEl.appendChild(overlayEl);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function resolveStyleClass(style) {
      if (typeof style === 'string') return STYLE_MAP[style] || '';
      if (style.Heading) {
        const level = style.Heading.level || 1;
        return level <= 2 ? `s-heading-${level}` : 's-bold';
      }
      return '';
    }

    // Listen for render events from the Rust backend
    listen('render', (event) => {
      const t0 = performance.now();
      console.log('render event received, picker:', event.payload.picker ? 'YES' : 'no', 'panes:', event.payload.panes?.length);
      renderFrame(event.payload);
      const elapsed = performance.now() - t0;
      if (elapsed > 5) {
        console.warn(`slow DOM render: ${elapsed.toFixed(1)}ms, lines: ${event.payload.panes?.[0]?.visible_lines?.length}`);
      }
    });

    // Forward key events to Rust
    document.addEventListener('keydown', async (e) => {
      // Don't forward if an input element is focused
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const key = {
        code: e.key,
        ctrl: e.ctrlKey,
        alt: e.altKey,
        shift: e.shiftKey,
        meta: e.metaKey,
      };

      console.log('key event:', e.key, key);
      e.preventDefault();
      try {
        await invoke('key_event', { key });
      } catch (err) {
        console.error('key_event invoke error:', err);
      }
    });

    // Request initial render
    invoke('initial_render');
  </script>
</body>
</html>
