<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom 🌱</title>
  <style>
    :root {
      --bg: #141414;
      --fg: #EBE9E7;
      --faded: #A3A3A3;
      --salient: #F4BF4F;
      --strong: #F5F2F0;
      --subtle: #37373E;
      --modeline: #1A1919;
      --highlight: #212228;
      --accent-green: #62C554;
      --accent-red: #CF6752;
      --accent-blue: #81A1C1;
      --accent-yellow: #F2DA61;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #editor {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .pane {
      position: absolute;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pane-content {
      flex: 1;
      overflow: hidden;
    }

    .line {
      white-space: pre;
      height: 1.6em;
    }

    .gutter {
      display: inline-block;
      width: 4em;
      text-align: right;
      padding-right: 0.5em;
      color: var(--faded);
      user-select: none;
    }

    .status-bar {
      height: 1.6em;
      padding: 0 1em;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
    }

    .status-bar.active {
      background: var(--highlight);
    }

    .status-bar.inactive {
      background: var(--subtle);
      color: var(--faded);
    }

    .mode-badge {
      font-weight: bold;
      margin-right: 0.5em;
    }

    .mode-normal { color: var(--fg); }
    .mode-insert { color: var(--bg); background: var(--accent-green); padding: 0 4px; }
    .mode-visual { color: var(--bg); background: var(--accent-blue); padding: 0 4px; }

    /* Syntax styles */
    .s-heading-1 { color: var(--strong); font-weight: bold; font-size: 1.5em; }
    .s-heading-2 { color: var(--salient); font-weight: bold; font-size: 1.3em; }
    .s-bold { font-weight: bold; }
    .s-italic { font-style: italic; }
    .s-tag { color: var(--faded); }
    .s-noise { color: var(--faded); opacity: 0.5; }
    .s-link { color: var(--strong); text-decoration: underline; }
    .s-checkbox-unchecked { color: var(--accent-yellow); }
    .s-checkbox-checked { color: var(--accent-green); text-decoration: line-through; }
    .s-frontmatter { color: var(--faded); font-style: italic; }

    .current-line { background: var(--highlight); }

    /* Picker overlay */
    .picker-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 10vh;
      z-index: 100;
    }

    .picker {
      background: var(--subtle);
      border: 1px solid var(--faded);
      border-radius: 8px;
      width: 60%;
      max-width: 700px;
      max-height: 70vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .picker-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .picker-title {
      color: var(--faded);
      font-size: 11px;
      margin-bottom: 8px;
    }

    .picker-input {
      background: var(--bg);
      border-radius: 4px;
      padding: 6px 10px;
      color: var(--fg);
      display: flex;
    }

    .picker-input .prompt { color: var(--faded); margin-right: 4px; }
    .picker-input .query { color: var(--fg); }
    .picker-input .cursor { border-left: 2px solid var(--salient); }

    .picker-results {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }

    .picker-row {
      padding: 4px 16px;
      display: flex;
      justify-content: space-between;
      cursor: default;
    }

    .picker-row.selected {
      background: rgba(255,255,255,0.08);
    }

    .picker-row .label { color: var(--fg); }
    .picker-row .marker { color: var(--salient); width: 1.5em; }
    .picker-row .middle { color: var(--faded); margin-left: 1em; }
    .picker-row .right { color: var(--faded); margin-left: auto; padding-left: 1em; }

    .picker-status {
      padding: 4px 16px 8px;
      color: var(--faded);
      font-size: 11px;
    }

    .picker-preview {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px;
      background: var(--bg);
      color: var(--faded);
      max-height: 30%;
      overflow-y: auto;
      white-space: pre-wrap;
      font-size: 12px;
    }

    #loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: var(--faded);
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div id="loading">Bloom 🌱</div>
  <div id="editor" style="display: none;"></div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    const editorEl = document.getElementById('editor');
    const loadingEl = document.getElementById('loading');

    // Style class mapping from Bloom's Style enum
    const STYLE_MAP = {
      'Normal': '',
      'Heading': 's-heading-1',
      'Bold': 's-bold',
      'Italic': 's-italic',
      'Tag': 's-tag',
      'SyntaxNoise': 's-noise',
      'LinkText': 's-link',
      'LinkChrome': 's-noise',
      'CheckboxUnchecked': 's-checkbox-unchecked',
      'CheckboxChecked': 's-checkbox-checked',
      'Frontmatter': 's-frontmatter',
      'FrontmatterTitle': 's-bold s-italic',
    };

    // -----------------------------------------------------------------------
    // Incremental DOM renderer — persistent elements, patch on diff
    // -----------------------------------------------------------------------

    let prevFrame = null;
    let paneEls = [];   // [{ container, content, lines[], gutters[], statusBar }]
    let pickerEl = null; // { container, header, results, resultRows[], status, preview }

    // Pre-create a reusable element for escapeHtml
    const _escapeEl = document.createElement('div');
    function escapeHtml(text) {
      if (!text) return '';
      _escapeEl.textContent = text;
      return _escapeEl.innerHTML;
    }

    function isCursorLine(pane, line) {
      return pane.is_active && line.source.Buffer !== undefined
          && line.source.Buffer === pane.cursor.line;
    }

    function renderLineSpans(line) {
      const text = line.text.replace(/[\r\n]+$/, '');
      if (line.spans.length === 0) return escapeHtml(text);
      let html = '';
      let lastEnd = 0;
      for (const span of line.spans) {
        const start = Math.min(span.range.start, text.length);
        const end = Math.min(span.range.end, text.length);
        if (lastEnd < start) html += escapeHtml(text.slice(lastEnd, start));
        const cls = resolveStyleClass(span.style);
        const slice = escapeHtml(text.slice(start, end));
        html += cls ? `<span class="${cls}">${slice}</span>` : slice;
        lastEnd = end;
      }
      if (lastEnd < text.length) html += escapeHtml(text.slice(lastEnd));
      return html;
    }

    function renderStatusBarHtml(pane) {
      if (pane.is_active) {
        const mode = pane.status_bar.mode.toLowerCase();
        return `<div>
          <span class="mode-badge mode-${mode}">${escapeHtml(pane.status_bar.mode)}</span>
          ${escapeHtml(pane.title)}${pane.dirty ? ' <span style="color:var(--salient)">[+]</span>' : ''}
        </div>
        <div style="color:var(--faded)">${pane.cursor.line + 1}:${pane.cursor.column + 1}</div>`;
      }
      return escapeHtml(pane.title);
    }

    // --- Pane DOM management ---

    function createPaneEl() {
      const container = document.createElement('div');
      container.className = 'pane';
      const content = document.createElement('div');
      content.className = 'pane-content';
      container.appendChild(content);
      const statusBar = document.createElement('div');
      statusBar.className = 'status-bar';
      container.appendChild(statusBar);
      return { container, content, lines: [], gutters: [], statusBar };
    }

    function ensureLineEls(el, count) {
      while (el.lines.length < count) {
        const lineEl = document.createElement('div');
        lineEl.className = 'line';
        const gutterEl = document.createElement('span');
        gutterEl.className = 'gutter';
        lineEl.appendChild(gutterEl);
        // Content span — holds everything after gutter
        const contentSpan = document.createElement('span');
        contentSpan.className = 'line-content';
        lineEl.appendChild(contentSpan);
        el.content.appendChild(lineEl);
        el.lines.push(lineEl);
        el.gutters.push(gutterEl);
      }
      while (el.lines.length > count) {
        el.lines.pop().remove();
        el.gutters.pop();
      }
    }

    // --- Picker DOM management ---

    function createPickerEl() {
      const container = document.createElement('div');
      container.className = 'picker-overlay';
      const picker = document.createElement('div');
      picker.className = 'picker';

      const header = document.createElement('div');
      header.className = 'picker-header';
      picker.appendChild(header);

      const results = document.createElement('div');
      results.className = 'picker-results';
      picker.appendChild(results);

      const status = document.createElement('div');
      status.className = 'picker-status';
      picker.appendChild(status);

      const preview = document.createElement('div');
      preview.className = 'picker-preview';
      preview.style.display = 'none';
      picker.appendChild(preview);

      container.appendChild(picker);
      return { container, header, results, resultRows: [], status, preview };
    }

    function ensurePickerRows(el, count) {
      while (el.resultRows.length < count) {
        const row = document.createElement('div');
        row.className = 'picker-row';
        el.results.appendChild(row);
        el.resultRows.push(row);
      }
      while (el.resultRows.length > count) {
        el.resultRows.pop().remove();
      }
    }

    // --- Main render function ---

    function renderFrame(frame) {
      loadingEl.style.display = 'none';
      editorEl.style.display = 'block';

      // --- Panes ---
      while (paneEls.length < frame.panes.length) {
        const el = createPaneEl();
        editorEl.appendChild(el.container);
        paneEls.push(el);
      }
      while (paneEls.length > frame.panes.length) {
        paneEls.pop().container.remove();
      }

      for (let p = 0; p < frame.panes.length; p++) {
        const pane = frame.panes[p];
        const prev = prevFrame?.panes?.[p];
        const el = paneEls[p];

        ensureLineEls(el, pane.visible_lines.length);

        for (let i = 0; i < pane.visible_lines.length; i++) {
          const line = pane.visible_lines[i];
          const prevLine = prev?.visible_lines?.[i];
          const lineEl = el.lines[i];
          const gutterEl = el.gutters[i];
          const contentEl = lineEl.querySelector('.line-content');

          const cursorNow = isCursorLine(pane, line);
          const cursorBefore = prev && prevLine && isCursorLine(prev, prevLine);

          // Fast path: if only cursor highlight changed, toggle class only
          const textChanged = !prevLine || prevLine.text !== line.text;
          const sourceChanged = !prevLine ||
            (prevLine.source.Buffer !== line.source.Buffer);

          if (!textChanged && !sourceChanged) {
            // Content identical — just update cursor highlight if needed
            if (cursorNow !== cursorBefore) {
              lineEl.classList.toggle('current-line', cursorNow);
            }
            continue;
          }

          // Content changed — update this line
          contentEl.innerHTML = renderLineSpans(line);
          lineEl.className = 'line' + (cursorNow ? ' current-line' : '');

          const bufLine = line.source.Buffer;
          gutterEl.textContent = bufLine !== undefined ? String(bufLine + 1) : '';
        }

        // Status bar — update if anything visible changed
        const statusChanged = !prev
          || prev.cursor.line !== pane.cursor.line
          || prev.cursor.column !== pane.cursor.column
          || prev.dirty !== pane.dirty
          || prev.title !== pane.title
          || prev.is_active !== pane.is_active
          || prev.status_bar.mode !== pane.status_bar.mode;

        if (statusChanged) {
          el.statusBar.innerHTML = renderStatusBarHtml(pane);
          el.statusBar.className = `status-bar ${pane.is_active ? 'active' : 'inactive'}`;
        }
      }

      // --- Picker overlay ---
      if (frame.picker && !pickerEl) {
        pickerEl = createPickerEl();
        editorEl.appendChild(pickerEl.container);
      }
      if (!frame.picker && pickerEl) {
        pickerEl.container.remove();
        pickerEl = null;
      }
      if (frame.picker && pickerEl) {
        const pk = frame.picker;
        const prevPk = prevFrame?.picker;

        // Header — update if query changed
        if (!prevPk || prevPk.query !== pk.query || prevPk.title !== pk.title) {
          pickerEl.header.innerHTML = `
            <div class="picker-title">${escapeHtml(pk.title)}</div>
            <div class="picker-input">
              <span class="prompt">❯ </span>
              <span class="query">${escapeHtml(pk.query)}</span>
              <span class="cursor">&nbsp;</span>
            </div>`;
        }

        // Results — patch rows
        ensurePickerRows(pickerEl, pk.results.length);
        for (let i = 0; i < pk.results.length; i++) {
          const row = pk.results[i];
          const prevRow = prevPk?.results?.[i];
          const rowEl = pickerEl.resultRows[i];
          const sel = i === pk.selected_index;
          const wasSel = prevPk && i === prevPk.selected_index;

          // Fast path: selection change only
          if (prevRow && prevRow.label === row.label
              && prevRow.middle === row.middle
              && prevRow.right === row.right) {
            if (sel !== wasSel) {
              rowEl.className = `picker-row${sel ? ' selected' : ''}`;
              rowEl.firstChild.textContent = sel ? '▸' : ' ';
            }
            continue;
          }

          // Content changed — rebuild row
          rowEl.className = `picker-row${sel ? ' selected' : ''}`;
          let rhtml = `<span class="marker">${sel ? '▸' : ' '}</span>`;
          rhtml += `<span class="label">${escapeHtml(row.label)}</span>`;
          if (row.middle) rhtml += `<span class="middle">${escapeHtml(row.middle)}</span>`;
          if (row.right) rhtml += `<span class="right">${escapeHtml(row.right)}</span>`;
          rowEl.innerHTML = rhtml;
        }

        // Status
        const statusText = `${pk.filtered_count} of ${pk.total_count} ${pk.status_noun}`;
        if (pickerEl.status.textContent !== statusText) {
          pickerEl.status.textContent = statusText;
        }

        // Preview
        if (pk.preview) {
          if (pickerEl.preview.textContent !== pk.preview) {
            pickerEl.preview.textContent = pk.preview;
          }
          pickerEl.preview.style.display = '';
        } else {
          pickerEl.preview.style.display = 'none';
        }
      }

      prevFrame = frame;
    }

    function resolveStyleClass(style) {
      if (typeof style === 'string') return STYLE_MAP[style] || '';
      if (style.Heading) {
        const level = style.Heading.level || 1;
        return level <= 2 ? `s-heading-${level}` : 's-bold';
      }
      return '';
    }

    // Listen for render events from the Rust backend
    listen('render', (event) => {
      const t0 = performance.now();
      console.log('render event received, picker:', event.payload.picker ? 'YES' : 'no', 'panes:', event.payload.panes?.length);
      renderFrame(event.payload);
      const elapsed = performance.now() - t0;
      if (elapsed > 5) {
        console.warn(`slow DOM render: ${elapsed.toFixed(1)}ms, lines: ${event.payload.panes?.[0]?.visible_lines?.length}`);
      }
    });

    // Forward key events to Rust
    document.addEventListener('keydown', async (e) => {
      // Don't forward if an input element is focused
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      const key = {
        code: e.key,
        ctrl: e.ctrlKey,
        alt: e.altKey,
        shift: e.shiftKey,
        meta: e.metaKey,
      };

      console.log('key event:', e.key, key);
      e.preventDefault();
      try {
        await invoke('key_event', { key });
      } catch (err) {
        console.error('key_event invoke error:', err);
      }
    });

    // --- Dimension measurement ---

    function measureCharSize() {
      const probe = document.createElement('span');
      probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font:inherit;';
      probe.textContent = 'M';
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return { charWidth: rect.width, lineHeight: rect.height || 22.4 };
    }

    function computeGridSize() {
      const { charWidth, lineHeight } = measureCharSize();
      const cols = Math.floor(window.innerWidth / charWidth);
      const rows = Math.floor(window.innerHeight / lineHeight);
      return { cols: Math.max(cols, 20), rows: Math.max(rows, 5) };
    }

    // --- Startup ---

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(async () => {
        const { cols, rows } = computeGridSize();
        await invoke('resize', { cols, rows });
      }, 50);
    });

    // Initial render with measured dimensions
    (async () => {
      const { cols, rows } = computeGridSize();
      await invoke('initial_render', { cols, rows });
    })();
  </script>
</body>
</html>
