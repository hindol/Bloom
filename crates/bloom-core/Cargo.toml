[package]
name = "bloom-core"
version.workspace = true
edition.workspace = true

[dependencies]
# Text buffer
ropey = "1"

# Markdown parsing
pulldown-cmark = "0.12"

# Serialization (frontmatter)
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"

# Channels
crossbeam-channel = "0.5"

# File watching
notify = "7"
notify-debouncer-mini = "0.5"

# UUID generation
rand = "0.8"

# Timestamps
chrono = { version = "0.4", features = ["serde"] }

# Config file
toml = "0.8"

# Error handling
thiserror = "2"

# Fuzzy matching
nucleo-matcher = "0.3"
rusqlite = { version = "0.32", features = ["bundled"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "benchmarks"
harness = false
